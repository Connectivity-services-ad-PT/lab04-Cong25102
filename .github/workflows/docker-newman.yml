name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build Docker image
        run: docker build -t fit4110/iot-ingestion:lab04 .

      - name: Run Docker container
        run: |
          docker run -d \
            --name fit4110-iot-lab04 \
            -p 8000:8000 \
            --env-file .env.example \
            fit4110/iot-ingestion:lab04

      - name: Wait for service health
        run: |
          echo "Waiting for service..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "Service is up!"
              exit 0
            fi
            echo "Attempt $i/30, retrying in 2s..."
            sleep 2
          done
          echo "Service failed to start"
          exit 1

      - name: Run Newman against Docker container
        run: npm run test:local

      - name: Show container logs on failure
        if: failure()
        run: docker logs fit4110-iot-lab04 || true

      - name: Stop container
        if: always()
        run: docker stop fit4110-iot-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/